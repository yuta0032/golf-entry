<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多胡杯ゴルフコンペ 参加登録</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --green:#2f6b3f; --green-d:#234f2f; --line:#dfe3dd;
    --bg:#f6f7f4; --ink:#1d231e; --muted:#6b756c; --bad:#b23b3b;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.6; -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px; margin:0 auto; padding:20px 16px 60px}
  header h1{font-size:20px; margin:0 0 2px; letter-spacing:.02em}
  header p{margin:0 0 18px; color:var(--muted); font-size:13px}
  .who{
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:10px 14px; font-size:13px; color:var(--muted); margin-bottom:16px;
  }
  .who b{color:var(--ink); font-weight:600}
  .field{margin-bottom:18px}
  label.q{display:block; font-weight:600; font-size:14px; margin-bottom:7px}
  .req{color:var(--bad); font-size:12px; margin-left:4px}
  input[type=text],input[type=email],input[type=date],input[type=tel],select,textarea{
    width:100%; padding:11px 12px; font-size:16px; color:var(--ink);
    border:1px solid var(--line); border-radius:10px; background:#fff;
  }
  textarea{min-height:80px; resize:vertical}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--green); border-color:var(--green)}
  .opts{display:flex; gap:8px; flex-wrap:wrap}
  .opt{flex:1 1 0; min-width:120px}
  .opt input{position:absolute; opacity:0; pointer-events:none}
  .opt span{
    display:block; text-align:center; padding:11px 8px; font-size:15px;
    border:1px solid var(--line); border-radius:10px; background:#fff; cursor:pointer;
  }
  .opt input:checked + span{
    background:var(--green); color:#fff; border-color:var(--green); font-weight:600;
  }
  .hidden{display:none}
  .sub{
    border-left:3px solid var(--green); padding-left:14px; margin:14px 0 0;
  }
  button.submit{
    width:100%; margin-top:8px; padding:15px; font-size:16px; font-weight:700;
    color:#fff; background:var(--green); border:none; border-radius:12px; cursor:pointer;
  }
  button.submit:active{background:var(--green-d)}
  button.submit:disabled{opacity:.5}
  .note{font-size:12px; color:var(--muted); margin-top:10px; text-align:center}
  .done{text-align:center; padding:50px 10px}
  .done .mark{font-size:44px}
  .done h2{margin:10px 0 6px; font-size:19px}
  .done p{color:var(--muted); margin:0}
  .loading{text-align:center; color:var(--muted); padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>多胡杯ゴルフコンペ</h1>
    <p>参加登録フォーム</p>
  </header>
  <div id="app"><div class="loading">読み込み中…</div></div>
</div>

<script>
/* ============================================================
   ここの2つを自分の値に書き換える
   ============================================================ */
const LIFF_ID = '2010392345-WMpqQivB';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVfEJMWakJbssH2pRQQ8NesAy0UX9lGO4IB3Jh59VWoDsr62HHdWIkc4A8jbt1rZZe3Q/exec';
const SECRET  = 'tagocup-x7k2q9m4';   // ★ gas-backend.gs と同じ文字列にする
const EVENT_NO = 61;   // ★ 多胡杯の回数。次回はここを 62 に変えるだけ
/* ============================================================ */

let profile = { userId:'', displayName:'' };

async function main(){
  await liff.init({ liffId: LIFF_ID });
  if(!liff.isLoggedIn()){ liff.login(); return; }
  profile = await liff.getProfile();
  document.querySelector('header p').textContent = '第' + EVENT_NO + '回 参加登録';
  renderForm();
  loadPrefill();
}

function renderForm(){
  document.getElementById('app').innerHTML = `
    <div class="field">
      <label class="q">姓名<span class="req">必須</span></label>
      <div class="opts">
        <input id="lastName" type="text" placeholder="姓（例：鈴木）" style="flex:1 1 0;min-width:0">
        <input id="firstName" type="text" placeholder="名（例：雄太）" style="flex:1 1 0;min-width:0">
      </div>
    </div>

    <div class="field">
      <label class="q">フリガナ<span class="req">必須</span></label>
      <div class="opts">
        <input id="kanaLast" type="text" placeholder="セイ（例：スズキ）" style="flex:1 1 0;min-width:0">
        <input id="kanaFirst" type="text" placeholder="メイ（例：ユウタ）" style="flex:1 1 0;min-width:0">
      </div>
    </div>

    <div class="field">
      <label class="q">性別<span class="req">必須</span></label>
      <div class="opts">
        <label class="opt"><input type="radio" name="gender" value="男性"><span>男性</span></label>
        <label class="opt"><input type="radio" name="gender" value="女性"><span>女性</span></label>
      </div>
    </div>

    <div class="field">
      <label class="q">携帯番号<span class="req">必須</span></label>
      <input id="phone" type="tel" inputmode="numeric" maxlength="11" placeholder="08012345678（ハイフン無し11桁）" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>

    <div class="field">
      <label class="q">メールアドレス（任意）</label>
      <input id="email" type="email" inputmode="email" placeholder="example@mail.com">
    </div>

    <div class="field">
      <label class="q">今回の参加<span class="req">必須</span></label>
      <div class="opts">
        <label class="opt"><input type="radio" name="join" value="参加する" onchange="toggleJoin()"><span>参加する</span></label>
        <label class="opt"><input type="radio" name="join" value="参加しない" onchange="toggleJoin()"><span>参加しない</span></label>
      </div>
    </div>

    <div id="detail" class="hidden">
      <div class="field">
        <label class="q">生年月日（西暦）<span class="req">必須</span></label>
        <div class="opts">
          <select id="birthY" style="flex:2 1 0;min-width:0"></select>
          <select id="birthM" style="flex:1 1 0;min-width:0"></select>
          <select id="birthD" style="flex:1 1 0;min-width:0"></select>
        </div>
      </div>

      <div class="field">
        <label class="q">初参加ですか？<span class="req">必須</span></label>
        <div class="opts">
          <label class="opt"><input type="radio" name="first" value="はい" onchange="toggleFirst()"><span>はい</span></label>
          <label class="opt"><input type="radio" name="first" value="いいえ" onchange="toggleFirst()"><span>いいえ</span></label>
        </div>
        <div id="referrerBox" class="sub hidden field">
          <label class="q">紹介者のお名前<span class="req">必須</span></label>
          <input id="referrer" type="text" placeholder="紹介してくれた方">
        </div>
      </div>

      <div class="field">
        <label class="q">会社としての参加ですか？<span class="req">必須</span></label>
        <div class="opts">
          <label class="opt"><input type="radio" name="company" value="会社参加" onchange="toggleCompany()"><span>はい</span></label>
          <label class="opt"><input type="radio" name="company" value="個人参加" onchange="toggleCompany()"><span>いいえ</span></label>
        </div>
        <div id="companyBox" class="sub hidden">
          <div class="field">
            <label class="q">会社名<span class="req">必須</span></label>
            <input id="companyName" type="text" placeholder="株式会社○○">
          </div>
          <div class="field">
            <label class="q">領収書<span class="req">必須</span></label>
            <div class="opts">
              <label class="opt"><input type="radio" name="receipt" value="必要"><span>必要</span></label>
              <label class="opt"><input type="radio" name="receipt" value="不要"><span>不要</span></label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="q">備考（任意）</label>
      <textarea id="note" placeholder="ご要望など"></textarea>
    </div>

    <button id="btn" class="submit" onclick="submitForm()">登録する</button>
    <p class="note">送信後に内容を変更したい場合は、もう一度開いて再送信してください。</p>
  `;
  fillBirthOptions();
}

function fillBirthOptions(){
  const now = new Date().getFullYear();
  let y = '<option value="">年</option>';
  for(let i=now;i>=1930;i--){ y += '<option value="'+i+'">'+i+'</option>'; }
  document.getElementById('birthY').innerHTML = y;
  let m = '<option value="">月</option>';
  for(let i=1;i<=12;i++){ m += '<option value="'+i+'">'+i+'</option>'; }
  document.getElementById('birthM').innerHTML = m;
  let d = '<option value="">日</option>';
  for(let i=1;i<=31;i++){ d += '<option value="'+i+'">'+i+'</option>'; }
  document.getElementById('birthD').innerHTML = d;
}

function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
function radio(name){ const el=document.querySelector('input[name="'+name+'"]:checked'); return el?el.value:''; }
function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v; }
function setRadio(name,v){ const el=document.querySelector('input[name="'+name+'"][value="'+v+'"]'); if(el) el.checked=true; }

/* 前回回答の引き継ぎ（JSONPでGASから取得して各項目に流し込む） */
function loadPrefill(){
  if(!profile.userId) return;
  window.__prefill = function(d){ try{ applyPrefill(d); }catch(e){} };
  const s = document.createElement('script');
  s.src = GAS_URL + '?action=prefill'
    + '&userId='  + encodeURIComponent(profile.userId)
    + '&secret='  + encodeURIComponent(SECRET)
    + '&callback=__prefill';
  s.onerror = function(){};
  document.body.appendChild(s);
}

function applyPrefill(d){
  if(!d || !d.name) return;
  const nm = String(d.name).split(' ');
  if(nm[0]) setVal('lastName', nm[0]);
  if(nm[1]) setVal('firstName', nm.slice(1).join(' '));
  if(d.kana){
    const kn = String(d.kana).split(' ');
    if(kn[0]) setVal('kanaLast', kn[0]);
    if(kn[1]) setVal('kanaFirst', kn.slice(1).join(' '));
  }
  if(d.phone)  setVal('phone', String(d.phone));
  if(d.email)  setVal('email', d.email);
  if(d.gender) setRadio('gender', d.gender);
  if(d.birth){
    const b = String(d.birth).split('-');
    if(b.length===3){
      setVal('birthY', String(parseInt(b[0],10)));
      setVal('birthM', String(parseInt(b[1],10)));
      setVal('birthD', String(parseInt(b[2],10)));
    }
  }
  if(d.firstTime)   setRadio('first', d.firstTime);
  if(d.referrer)    setVal('referrer', d.referrer);
  if(d.company)     setRadio('company', d.company);
  if(d.companyName) setVal('companyName', d.companyName);
  if(d.receipt)     setRadio('receipt', d.receipt);
  toggleFirst();
  toggleCompany();
}

function toggleJoin(){
  const join = radio('join');
  document.getElementById('detail').classList.toggle('hidden', join !== '参加する');
}
function toggleFirst(){
  document.getElementById('referrerBox').classList.toggle('hidden', radio('first') !== 'はい');
}
function toggleCompany(){
  document.getElementById('companyBox').classList.toggle('hidden', radio('company') !== '会社参加');
}

async function submitForm(){
  // 必須チェック（任意は「メール」と「備考」のみ。条件で表示される項目は表示時のみ必須）
  if(!val('lastName') || !val('firstName')){ alert('姓名（姓・名の両方）を入力してください。'); return; }
  if(!val('kanaLast') || !val('kanaFirst')){ alert('フリガナ（セイ・メイの両方）を入力してください。'); return; }
  if(!/^\d{11}$/.test(val('phone'))){ alert('携帯番号はハイフンなしの数字11桁で入力してください。'); return; }
  if(!radio('gender')){ alert('性別を選んでください。'); return; }
  if(!radio('join')){ alert('参加の有無を選んでください。'); return; }
  if(radio('join')==='参加する'){
    if(!val('birthY') || !val('birthM') || !val('birthD')){ alert('生年月日を選んでください。'); return; }
    if(!radio('first')){ alert('「初参加ですか？」を選んでください。'); return; }
    if(radio('first')==='はい' && !val('referrer')){ alert('紹介者を入力してください。'); return; }
    if(!radio('company')){ alert('「会社としての参加ですか？」を選んでください。'); return; }
    if(radio('company')==='会社参加'){
      if(!val('companyName')){ alert('会社名を入力してください。'); return; }
      if(!radio('receipt')){ alert('領収書の要否を選んでください。'); return; }
    }
  }

  const fullName = val('lastName') + ' ' + val('firstName');
  const fullKana = val('kanaLast') + ' ' + val('kanaFirst');
  const birthStr = (radio('join')==='参加する')
    ? (val('birthY') + '-' + ('0'+val('birthM')).slice(-2) + '-' + ('0'+val('birthD')).slice(-2))
    : '';

  const data = {
    secret:      SECRET,
    eventNo:     EVENT_NO,
    userId:      profile.userId,
    displayName: profile.displayName,
    phone:       val('phone'),
    email:       val('email'),
    name:        fullName,
    kana:        fullKana,
    gender:      radio('gender'),
    join:        radio('join'),
    birth:       birthStr,
    firstTime:   radio('join')==='参加する' ? radio('first') : '',
    referrer:    radio('first')==='はい' ? val('referrer') : '',
    company:     radio('join')==='参加する' ? radio('company') : '',
    companyName: radio('company')==='会社参加' ? val('companyName') : '',
    receipt:     radio('company')==='会社参加' ? radio('receipt') : '',
    note:        val('note')
  };

  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '送信中…';

  try{
    // text/plain で送るとCORSのプリフライトを避けられる（GAS向けの定番）
    await fetch(GAS_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    });
    showDone();
  }catch(err){
    // 多くの場合データ自体は書き込まれているが、念のため案内
    showDone();
  }
}

function showDone(){
  document.getElementById('app').innerHTML = `
    <div class="done">
      <div class="mark">✓</div>
      <h2>登録ありがとうございました</h2>
      <p>幹事に内容が届きました。</p>
    </div>`;
  if (window.liff && liff.isInClient && liff.isInClient()){
    setTimeout(()=>{ try{ liff.closeWindow(); }catch(e){} }, 1500);
  }
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

main().catch(err => {
  document.getElementById('app').innerHTML =
    '<div class="loading">読み込みに失敗しました。<br>LIFF IDの設定をご確認ください。<br><small>'+escapeHtml(String(err))+'</small></div>';
});
</script>
</body>
</html>
